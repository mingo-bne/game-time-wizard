<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Club basketball management — roster, ratings, rotation, duty, comms." />
  <title>Game Time Wizard</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏀</text></svg>" />

  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#fff7ed',  100: '#ffedd5',
              500: '#f97316',  600: '#ea580c', 700: '#c2410c', 900: '#7c2d12'
            }
          },
          fontFamily: { sans: ['system-ui','-apple-system','Segoe UI','Roboto','sans-serif'] }
        }
      }
    }
  </script>

  <!-- Alpine.js (defer = runs after DOM parsed) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Supabase JS client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App config (user-supplied — copy config.js.example → config.js) -->
  <script src="config.js"></script>

  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen">

  <div x-data="app()" x-init="init()" x-cloak class="min-h-screen">

    <!-- ========== CONFIG MISSING ========== -->
    <template x-if="configMissing">
      <div class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-lg bg-white border border-amber-300 rounded-xl shadow-sm p-6">
          <h1 class="text-xl font-semibold mb-2">⚙️ Setup needed</h1>
          <p class="text-sm text-slate-600 mb-4">
            <code>config.js</code> is missing or incomplete. Copy <code>config.js.example</code>
            to <code>config.js</code> and fill in your Supabase URL and anon key.
          </p>
        </div>
      </div>
    </template>

    <!-- ========== LOADING ========== -->
    <template x-if="!configMissing && loading">
      <div class="min-h-screen flex items-center justify-center">
        <div class="text-slate-500 text-sm">Loading…</div>
      </div>
    </template>

    <!-- ========== LOGIN ========== -->
    <template x-if="!configMissing && !loading && !session">
      <div class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white border border-slate-200 rounded-xl shadow-sm p-8">
          <div class="text-center mb-6">
            <div class="text-4xl mb-2">🏀</div>
            <h1 class="text-2xl font-bold">Game Time Wizard</h1>
            <p class="text-sm text-slate-500 mt-1">Club basketball management</p>
          </div>

          <template x-if="!magicLinkSent">
            <form @submit.prevent="sendMagicLink()" class="space-y-4">
              <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" required x-model="loginEmail"
                  placeholder="you@example.com"
                  class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" />
              </div>
              <button type="submit" :disabled="sending"
                class="w-full bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white rounded-lg py-2 font-medium">
                <span x-text="sending ? 'Sending…' : 'Send magic link'"></span>
              </button>
              <p class="text-xs text-slate-500 text-center">We'll email you a sign-in link. No password required.</p>
            </form>
          </template>

          <template x-if="magicLinkSent">
            <div class="text-center space-y-3">
              <div class="text-3xl">📬</div>
              <p class="text-sm">
                Check your inbox at <strong x-text="loginEmail"></strong> and click the link to sign in.
              </p>
              <button @click="magicLinkSent = false" class="text-xs text-brand-600 hover:underline">Use a different email</button>
            </div>
          </template>

          <template x-if="loginError">
            <p class="mt-4 text-sm text-red-600 text-center" x-text="loginError"></p>
          </template>
        </div>
      </div>
    </template>

    <!-- ========== ACCESS DENIED ========== -->
    <template x-if="!configMissing && !loading && session && accessDenied">
      <div class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white border border-red-200 rounded-xl shadow-sm p-8 text-center">
          <div class="text-4xl mb-3">🚫</div>
          <h1 class="text-xl font-bold mb-2">No access</h1>
          <p class="text-sm text-slate-600 mb-4">
            You're signed in as <strong x-text="session?.user?.email"></strong> but haven't been added to a club.
            Ask your club admin to invite you, then sign in again.
          </p>
          <button @click="signOut()" class="text-sm text-brand-600 hover:underline">Sign out</button>
        </div>
      </div>
    </template>

    <!-- ========== APP SHELL (signed in, with staff record) ========== -->
    <template x-if="!configMissing && !loading && session && !accessDenied && currentStaff">
      <div class="flex min-h-screen">

        <!-- SIDEBAR -->
        <aside class="w-60 bg-white border-r border-slate-200 hidden md:flex md:flex-col">
          <div class="p-4 border-b border-slate-200">
            <div class="flex items-center gap-2">
              <span class="text-2xl">🏀</span>
              <span class="font-semibold">Game Time Wizard</span>
            </div>
            <div class="mt-2 text-xs text-slate-500 truncate" x-text="currentClub?.name"></div>
          </div>
          <nav class="flex-1 p-3 space-y-1">
            <template x-for="item in nav" :key="item.route">
              <a :href="'#/' + item.route" @click.prevent="navigate(item.route)"
                :class="route === item.route ? 'bg-brand-50 text-brand-700 font-medium' : 'text-slate-700 hover:bg-slate-100'"
                class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm">
                <span x-text="item.icon"></span>
                <span x-text="item.label"></span>
              </a>
            </template>
          </nav>
          <div class="p-3 border-t border-slate-200">
            <div class="text-xs font-medium" x-text="currentStaff?.full_name"></div>
            <div class="text-xs text-slate-500 truncate" x-text="session?.user?.email"></div>
            <div class="mt-1 text-[10px] uppercase tracking-wider text-brand-600" x-show="currentStaff?.is_admin">Admin</div>
            <button @click="signOut()" class="mt-2 w-full text-left text-xs text-slate-600 hover:text-red-600">Sign out</button>
          </div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col">

          <!-- Mobile top bar -->
          <header class="md:hidden bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="text-xl">🏀</span>
              <span class="font-semibold" x-text="currentClub?.name || 'Game Time Wizard'"></span>
            </div>
            <button @click="signOut()" class="text-xs text-slate-600">Sign out</button>
          </header>

          <!-- Mobile bottom nav -->
          <nav class="md:hidden order-last bg-white border-t border-slate-200 grid grid-cols-6">
            <template x-for="item in nav" :key="item.route">
              <a :href="'#/' + item.route" @click.prevent="navigate(item.route)"
                :class="route === item.route ? 'text-brand-600' : 'text-slate-500'"
                class="flex flex-col items-center py-2 text-xs">
                <span class="text-lg" x-text="item.icon"></span>
                <span x-text="item.label"></span>
              </a>
            </template>
          </nav>

          <div class="flex-1 p-4 md:p-8 overflow-y-auto">

            <!-- ========== DASHBOARD ========== -->
            <template x-if="route === 'dashboard'">
              <div x-data="dashboardView(currentClub, currentStaff, (r,s) => navigate(r,s))" x-init="init()">
                <div class="mb-6">
                  <h1 class="text-2xl font-bold">Dashboard</h1>
                  <p class="text-sm text-slate-500" x-text="'Welcome back, ' + currentStaff.full_name + '.'"></p>
                </div>

                <p x-show="error" x-text="error" class="text-sm text-red-600 mb-3"></p>
                <div x-show="loading" class="text-sm text-slate-500">Loading…</div>

                <template x-if="!loading && summary">
                  <div class="space-y-6">
                    <!-- Stat cards -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                      <button @click="goTo('teams')"
                        class="text-left bg-white border border-slate-200 rounded-xl p-4 hover:bg-brand-50 hover:border-brand-300 transition">
                        <div class="text-xs uppercase text-slate-500 mb-1">Teams</div>
                        <div class="text-3xl font-bold" x-text="summary.teams_count"></div>
                      </button>
                      <button @click="goTo('roster')"
                        class="text-left bg-white border border-slate-200 rounded-xl p-4 hover:bg-brand-50 hover:border-brand-300 transition">
                        <div class="text-xs uppercase text-slate-500 mb-1">Players</div>
                        <div class="text-3xl font-bold" x-text="summary.players_count"></div>
                      </button>
                      <button @click="goTo('games')"
                        class="text-left bg-white border border-slate-200 rounded-xl p-4 hover:bg-brand-50 hover:border-brand-300 transition">
                        <div class="text-xs uppercase text-slate-500 mb-1">Upcoming games</div>
                        <div class="text-3xl font-bold" x-text="summary.games_count"></div>
                      </button>
                      <button @click="goTo('settings')"
                        class="text-left bg-white border border-slate-200 rounded-xl p-4 hover:bg-brand-50 hover:border-brand-300 transition">
                        <div class="text-xs uppercase text-slate-500 mb-1">Staff</div>
                        <div class="text-3xl font-bold" x-text="summary.staff_count"></div>
                      </button>
                    </div>

                    <!-- Upcoming games -->
                    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden">
                      <div class="p-4 border-b border-slate-200 flex items-center justify-between">
                        <h2 class="text-base font-semibold">Next 5 games</h2>
                        <button @click="goTo('games')" class="text-xs text-brand-600 hover:underline">View all →</button>
                      </div>
                      <template x-if="summary.upcoming_games.length === 0">
                        <div class="p-6 text-center text-sm text-slate-500">
                          No upcoming games. Add games on the <button @click="goTo('games')" class="text-brand-600 hover:underline">Games</button> page.
                        </div>
                      </template>
                      <template x-if="summary.upcoming_games.length > 0">
                        <div class="divide-y divide-slate-100">
                          <template x-for="g in summary.upcoming_games" :key="g.id">
                            <button @click="openGame(g)" class="w-full text-left p-4 hover:bg-brand-50 transition">
                              <div class="flex items-start justify-between gap-3">
                                <div class="min-w-0 flex-1">
                                  <div class="font-medium" x-text="(g.team?.name || 'Team') + ' vs ' + (g.opposition?.name || 'TBD')"></div>
                                  <div class="text-sm text-slate-600 mt-0.5">
                                    <span x-text="formatDate(g.game_date)"></span>
                                    <template x-if="g.game_time">
                                      <span> · <span x-text="formatTime(g.game_time)"></span></span>
                                    </template>
                                    <template x-if="g.venue">
                                      <span> · <span x-text="g.venue"></span></span>
                                    </template>
                                    <template x-if="g.court">
                                      <span> <span x-text="g.court"></span></span>
                                    </template>
                                  </div>
                                </div>
                                <div :class="daysClass(g.game_date)" class="text-sm whitespace-nowrap" x-text="daysLabel(g.game_date)"></div>
                              </div>
                            </button>
                          </template>
                        </div>
                      </template>
                    </div>

                    <!-- Quick links -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                      <button @click="goTo('roster')"
                        class="bg-white border border-slate-200 rounded-xl p-3 hover:bg-brand-50 text-left">
                        <div class="font-medium">🏀 Manage roster</div>
                        <div class="text-xs text-slate-500 mt-0.5">Players + families</div>
                      </button>
                      <button @click="goTo('ratings')"
                        class="bg-white border border-slate-200 rounded-xl p-3 hover:bg-brand-50 text-left">
                        <div class="font-medium">⭐ Update ratings</div>
                        <div class="text-xs text-slate-500 mt-0.5">11 sub-skills per player</div>
                      </button>
                      <button @click="goTo('games')"
                        class="bg-white border border-slate-200 rounded-xl p-3 hover:bg-brand-50 text-left">
                        <div class="font-medium">📅 Schedule game</div>
                        <div class="text-xs text-slate-500 mt-0.5">Add fixture</div>
                      </button>
                      <button @click="goTo('settings')"
                        class="bg-white border border-slate-200 rounded-xl p-3 hover:bg-brand-50 text-left">
                        <div class="font-medium">⚙️ Settings</div>
                        <div class="text-xs text-slate-500 mt-0.5">Club + staff</div>
                      </button>
                    </div>
                  </div>
                </template>
              </div>
            </template>

            <!-- ========== TEAMS LIST ========== -->
            <template x-if="route === 'teams' && !subroute">
              <div x-data="teamsView(currentClub, currentStaff, (r,s) => navigate(r,s))" x-init="init()">
                <div class="flex items-center justify-between mb-6">
                  <div>
                    <h1 class="text-2xl font-bold">Teams</h1>
                    <p class="text-sm text-slate-500">Create teams and assign staff.</p>
                  </div>
                  <button x-show="isAdmin()" @click="startCreate()"
                    class="bg-brand-600 hover:bg-brand-700 text-white text-sm rounded-lg px-4 py-2 font-medium">
                    + New team
                  </button>
                </div>

                <p x-show="error" x-text="error" class="text-sm text-red-600 mb-3"></p>
                <div x-show="loading" class="text-sm text-slate-500">Loading…</div>

                <div x-show="!loading && teams.length === 0 && !showCreate"
                  class="bg-white border border-slate-200 rounded-xl p-8 text-center">
                  <p class="text-slate-600 mb-2">No teams yet.</p>
                  <p class="text-sm text-slate-500" x-show="isAdmin()">Click "+ New team" to create your first team.</p>
                  <p class="text-sm text-slate-500" x-show="!isAdmin()">Ask your club admin to create a team and assign you.</p>
                </div>

                <!-- Team list -->
                <div x-show="!loading && teams.length > 0" class="bg-white border border-slate-200 rounded-xl overflow-hidden">
                  <table class="w-full text-sm">
                    <thead class="bg-slate-50 text-xs uppercase text-slate-600">
                      <tr>
                        <th class="text-left p-3">Team</th>
                        <th class="text-left p-3">Age group</th>
                        <th class="text-left p-3">Gender</th>
                        <th class="text-left p-3">Division</th>
                        <th class="text-left p-3">Format</th>
                        <th class="text-left p-3">Rule mode</th>
                        <th class="text-right p-3"></th>
                      </tr>
                    </thead>
                    <tbody>
                      <template x-for="t in teams" :key="t.id">
                        <tr class="border-t border-slate-100 hover:bg-brand-50">
                          <td class="p-3 font-medium">
                            <a href="#" @click.prevent="open(t)" class="text-brand-700 hover:underline" x-text="t.name"></a>
                          </td>
                          <td class="p-3 text-slate-600" x-text="t.age_group || '—'"></td>
                          <td class="p-3 text-slate-600" x-text="genderLabel(t.gender)"></td>
                          <td class="p-3 text-slate-600" x-text="t.division || '—'"></td>
                          <td class="p-3 text-slate-600" x-text="formatLabel(t)"></td>
                          <td class="p-3 text-slate-600" x-text="ruleLabel(t)"></td>
                          <td class="p-3 text-right">
                            <button x-show="isAdmin()" @click="deleteTeam(t)"
                              class="text-xs text-red-600 hover:underline">Delete</button>
                          </td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>

                <!-- Create form -->
                <template x-if="showCreate">
                  <div class="mt-6 bg-white border border-slate-200 rounded-xl p-6">
                    <h2 class="text-lg font-semibold mb-4">New team</h2>
                    <form @submit.prevent="createTeam()" class="space-y-4">
                      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                          <label class="block text-sm font-medium mb-1">Team name *</label>
                          <input required x-model="newTeam.name" placeholder="U14 Boys Black"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                        </div>
                        <div>
                          <label class="block text-sm font-medium mb-1">Age group</label>
                          <input x-model="newTeam.age_group" placeholder="U10"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                        </div>
                        <div>
                          <label class="block text-sm font-medium mb-1">Gender</label>
                          <select x-model="newTeam.gender" class="w-full border border-slate-300 rounded-lg px-3 py-2">
                            <option value="">— Pick —</option>
                            <option value="M">Boys</option>
                            <option value="F">Girls</option>
                            <option value="X">Mixed</option>
                            <option value="NA">Open / Adult</option>
                          </select>
                        </div>
                        <div>
                          <label class="block text-sm font-medium mb-1">Division</label>
                          <input x-model="newTeam.division" placeholder="Div 5"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          <p class="text-xs text-slate-500 mt-1">Used to filter opponents in fixtures.</p>
                        </div>
                        <div>
                          <label class="block text-sm font-medium mb-1">Rule mode</label>
                          <select x-model="newTeam.rule_mode" class="w-full border border-slate-300 rounded-lg px-3 py-2">
                            <option value="equal_opportunity">Equal Opportunity (juniors)</option>
                            <option value="no_engine">No Engine (senior — manual scratch pad)</option>
                          </select>
                        </div>
                        <div>
                          <label class="block text-sm font-medium mb-1">Periods per game</label>
                          <input type="number" min="1" max="8" x-model="newTeam.game_format_periods"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                        </div>
                        <div>
                          <label class="block text-sm font-medium mb-1">Minutes per period</label>
                          <input type="number" min="1" max="30" x-model="newTeam.game_format_minutes_per_period"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                        </div>
                      </div>
                      <div class="text-xs text-slate-500">Total game length: <span x-text="(newTeam.game_format_periods * newTeam.game_format_minutes_per_period)"></span> min</div>
                      <div class="flex gap-2 pt-2">
                        <button type="submit" :disabled="saving"
                          class="bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm rounded-lg px-4 py-2 font-medium">
                          <span x-text="saving ? 'Creating…' : 'Create team'"></span>
                        </button>
                        <button type="button" @click="showCreate = false"
                          class="text-sm text-slate-600 hover:text-slate-900 px-4 py-2">Cancel</button>
                      </div>
                    </form>
                  </div>
                </template>
              </div>
            </template>

            <!-- ========== TEAM DETAIL ========== -->
            <template x-if="route === 'teams' && subroute">
              <div x-data="teamDetailView(currentClub, currentStaff, subroute, (r,s) => navigate(r,s))" x-init="init()">
                <div class="mb-4">
                  <a href="#" @click.prevent="backToList()" class="text-sm text-brand-600 hover:underline">← Back to teams</a>
                </div>

                <div x-show="loading" class="text-sm text-slate-500">Loading…</div>

                <template x-if="!loading && team">
                  <div class="space-y-6">
                    <div>
                      <h1 class="text-2xl font-bold" x-text="team.name"></h1>
                      <div class="text-sm text-slate-500">
                        <span x-text="team.age_group || 'No age group'"></span>
                        <template x-if="team.gender">
                          <span> · <span x-text="genderLabel(team.gender)"></span></span>
                        </template>
                        <template x-if="team.division">
                          <span> · <span x-text="team.division"></span></span>
                        </template>
                      </div>
                    </div>

                    <p x-show="error" x-text="error" class="text-sm text-red-600"></p>

                    <!-- Team settings -->
                    <div class="bg-white border border-slate-200 rounded-xl p-6">
                      <h2 class="text-lg font-semibold mb-4">Team settings</h2>
                      <fieldset :disabled="!canEdit()" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <div>
                            <label class="block text-sm font-medium mb-1">Team name</label>
                            <input x-model="teamForm.name" class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Age group</label>
                            <input x-model="teamForm.age_group" class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Gender</label>
                            <select x-model="teamForm.gender" class="w-full border border-slate-300 rounded-lg px-3 py-2">
                              <option value="">— Pick —</option>
                              <option value="M">Boys</option>
                              <option value="F">Girls</option>
                              <option value="X">Mixed</option>
                              <option value="NA">Open / Adult</option>
                            </select>
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Division</label>
                            <input x-model="teamForm.division" placeholder="Div 5"
                              class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Rule mode</label>
                            <select x-model="teamForm.rule_mode" class="w-full border border-slate-300 rounded-lg px-3 py-2">
                              <option value="equal_opportunity">Equal Opportunity (juniors)</option>
                              <option value="no_engine">No Engine (senior — manual scratch pad)</option>
                            </select>
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Periods per game</label>
                            <input type="number" min="1" max="8" x-model="teamForm.game_format_periods"
                              class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Minutes per period</label>
                            <input type="number" min="1" max="30" x-model="teamForm.game_format_minutes_per_period"
                              class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                        </div>
                        <div class="text-xs text-slate-500">Total: <span x-text="(teamForm.game_format_periods * teamForm.game_format_minutes_per_period)"></span> min</div>
                        <button x-show="canEdit()" type="button" @click="saveTeam()" :disabled="saving"
                          class="bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm rounded-lg px-4 py-2 font-medium">
                          <span x-text="saving ? 'Saving…' : 'Save changes'"></span>
                        </button>
                      </fieldset>
                    </div>

                    <!-- Staff assignments -->
                    <div class="bg-white border border-slate-200 rounded-xl p-6">
                      <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold">Staff on this team</h2>
                        <button x-show="isAdmin() && unassignedStaff().length > 0" @click="startAddStaff()"
                          class="bg-brand-600 hover:bg-brand-700 text-white text-xs rounded-lg px-3 py-1.5 font-medium">
                          + Assign staff
                        </button>
                      </div>

                      <div x-show="teamStaff.length === 0" class="text-sm text-slate-500">
                        No staff assigned to this team yet.
                      </div>

                      <table x-show="teamStaff.length > 0" class="w-full text-sm">
                        <thead class="text-xs uppercase text-slate-600 border-b border-slate-200">
                          <tr>
                            <th class="text-left py-2">Name</th>
                            <th class="text-left py-2">Email</th>
                            <th class="text-left py-2">Role on team</th>
                            <th class="text-right py-2"></th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="ts in teamStaff" :key="ts.id">
                            <tr class="border-b border-slate-100">
                              <td class="py-2" x-text="ts.staff?.full_name"></td>
                              <td class="py-2 text-slate-600" x-text="ts.staff?.email"></td>
                              <td class="py-2">
                                <select x-show="isAdmin()" :value="ts.role" @change="changeRole(ts, $event.target.value)"
                                  class="text-xs border border-slate-300 rounded px-2 py-1">
                                  <option value="head_coach">Head Coach</option>
                                  <option value="assistant_coach">Assistant Coach</option>
                                  <option value="team_manager">Team Manager</option>
                                </select>
                                <span x-show="!isAdmin()" x-text="roleLabel(ts.role)"></span>
                              </td>
                              <td class="py-2 text-right">
                                <button x-show="isAdmin()" @click="unassign(ts)" class="text-xs text-red-600 hover:underline">Remove</button>
                              </td>
                            </tr>
                          </template>
                        </tbody>
                      </table>

                      <!-- Assign staff form -->
                      <template x-if="showAddStaff">
                        <div class="mt-4 p-4 bg-slate-50 rounded-lg">
                          <div class="grid grid-cols-1 md:grid-cols-3 gap-3 items-end">
                            <div>
                              <label class="block text-xs font-medium mb-1">Staff member</label>
                              <select x-model="selectedStaffId" class="w-full border border-slate-300 rounded px-2 py-1.5 text-sm">
                                <template x-for="s in unassignedStaff()" :key="s.id">
                                  <option :value="s.id" x-text="s.full_name + ' (' + s.email + ')'"></option>
                                </template>
                              </select>
                            </div>
                            <div>
                              <label class="block text-xs font-medium mb-1">Role</label>
                              <select x-model="selectedRole" class="w-full border border-slate-300 rounded px-2 py-1.5 text-sm">
                                <option value="head_coach">Head Coach</option>
                                <option value="assistant_coach">Assistant Coach</option>
                                <option value="team_manager">Team Manager</option>
                              </select>
                            </div>
                            <div class="flex gap-2">
                              <button @click="assignStaff()"
                                class="bg-brand-600 hover:bg-brand-700 text-white text-sm rounded px-3 py-1.5">Assign</button>
                              <button @click="showAddStaff = false"
                                class="text-sm text-slate-600 px-3 py-1.5">Cancel</button>
                            </div>
                          </div>
                        </div>
                      </template>
                    </div>

                    <!-- Bench duty (player-based) -->
                    <div class="bg-white border border-slate-200 rounded-xl p-6">
                      <div class="flex items-center justify-between mb-4">
                        <div>
                          <h2 class="text-lg font-semibold">Bench duty</h2>
                          <p class="text-xs text-slate-500">Per-player rotation. Untick siblings so a family doesn't get hit twice. Algorithm respects exclusions and game-day availability.</p>
                        </div>
                        <button x-show="canEdit() && eligiblePoolCount() > 0" @click="runGenerateRoster()" :disabled="dutyLoading"
                          class="bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm rounded-lg px-3 py-1.5 font-medium whitespace-nowrap">
                          <span x-text="dutyLoading ? 'Generating…' : 'Generate roster'"></span>
                        </button>
                      </div>

                      <p x-show="dutyError" x-text="dutyError" class="text-sm text-red-600 mb-3"></p>

                      <!-- Empty state -->
                      <div x-show="dutyPool.length === 0" class="text-sm text-slate-500 italic">
                        No active players on this team. Add players via Roster first.
                      </div>

                      <template x-if="dutyPool.length > 0">
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

                          <!-- Duty pool players -->
                          <div>
                            <h3 class="text-sm font-semibold text-slate-700 mb-2">
                              Duty pool — <span x-text="eligiblePoolCount()"></span> of <span x-text="dutyPool.length"></span> players in rotation
                            </h3>
                            <div class="space-y-2">
                              <template x-for="m in dutyPool" :key="m.id">
                                <div class="border border-slate-200 rounded-lg p-3"
                                     :class="!m.duty_eligible && 'opacity-60 bg-slate-50'">
                                  <div class="flex items-center justify-between mb-1">
                                    <div class="flex items-center gap-2 min-w-0">
                                      <input type="checkbox" :checked="m.duty_eligible"
                                        :disabled="!canEdit()"
                                        @change="toggleDutyEligibility(m)"
                                        class="rounded text-brand-600 focus:ring-brand-500" />
                                      <div class="min-w-0">
                                        <div class="font-medium text-sm truncate" x-text="m.player?.full_name || '—'"></div>
                                        <template x-if="m.player?.family">
                                          <div class="text-xs text-slate-500 truncate" x-text="m.player.family.family_name + ' Family'"></div>
                                        </template>
                                      </div>
                                    </div>
                                    <div class="text-xs text-slate-500 ml-2 shrink-0">
                                      Duties: <span class="font-mono" x-text="dutyCounts()[m.player.id] || 0"></span>
                                    </div>
                                  </div>

                                  <!-- Existing exclusions -->
                                  <template x-if="exclusionsForPlayer(m.player.id).length > 0">
                                    <div class="mt-2 space-y-1">
                                      <template x-for="e in exclusionsForPlayer(m.player.id)" :key="e.id">
                                        <div class="flex items-center justify-between text-xs bg-amber-50 border border-amber-200 rounded px-2 py-1">
                                          <span x-text="exclusionLabel(e)"></span>
                                          <button x-show="canEdit()" @click="removeExclusion(e.id)" class="text-red-600 hover:underline ml-2">×</button>
                                        </div>
                                      </template>
                                    </div>
                                  </template>

                                  <!-- Add exclusion -->
                                  <template x-if="showExclusionForm === m.player.id">
                                    <div class="mt-2 p-2 bg-slate-50 rounded space-y-2">
                                      <div class="grid grid-cols-1 gap-2">
                                        <select x-model="exclusionForm.exclusion_type"
                                          class="border border-slate-300 rounded px-2 py-1 text-xs">
                                          <option value="one_off">One-off date</option>
                                          <option value="partial">Date range</option>
                                          <option value="full_season">Full season</option>
                                        </select>
                                        <template x-if="exclusionForm.exclusion_type !== 'full_season'">
                                          <div class="grid grid-cols-2 gap-2">
                                            <input type="date" x-model="exclusionForm.date_from"
                                              :placeholder="exclusionForm.exclusion_type === 'one_off' ? 'Date' : 'From'"
                                              class="border border-slate-300 rounded px-2 py-1 text-xs" />
                                            <template x-if="exclusionForm.exclusion_type === 'partial'">
                                              <input type="date" x-model="exclusionForm.date_to" placeholder="To"
                                                class="border border-slate-300 rounded px-2 py-1 text-xs" />
                                            </template>
                                          </div>
                                        </template>
                                        <input type="text" x-model="exclusionForm.reason" placeholder="Reason (optional, e.g. travelling)"
                                          class="border border-slate-300 rounded px-2 py-1 text-xs" />
                                      </div>
                                      <div class="flex gap-1">
                                        <button @click="saveExclusion()"
                                          class="bg-brand-600 text-white text-xs rounded px-2 py-1">Add</button>
                                        <button @click="cancelExclusionForm()"
                                          class="text-xs text-slate-600 px-2 py-1">Cancel</button>
                                      </div>
                                    </div>
                                  </template>
                                  <template x-if="showExclusionForm !== m.player.id && m.duty_eligible">
                                    <button x-show="canEdit()" @click="startAddExclusion(m.player.id)"
                                      class="mt-1 text-xs text-brand-600 hover:underline">+ Add exclusion</button>
                                  </template>
                                </div>
                              </template>
                            </div>
                          </div>

                          <!-- Duty roster -->
                          <div>
                            <h3 class="text-sm font-semibold text-slate-700 mb-2">Duty roster (<span x-text="dutyAssignments.length"></span> assigned)</h3>
                            <div x-show="dutyAssignments.length === 0" class="text-xs text-slate-500 italic">
                              No assignments yet. Click "Generate roster".
                            </div>
                            <div class="space-y-1.5">
                              <template x-for="a in dutyAssignments" :key="a.id">
                                <div class="flex items-center justify-between gap-2 border border-slate-200 rounded px-3 py-2 text-sm">
                                  <div class="min-w-0 flex-1">
                                    <div class="font-medium truncate">
                                      <span x-text="formatDutyDate(a.game?.game_date)"></span>
                                      <template x-if="a.game?.opposition?.name">
                                        <span class="text-slate-500"> · vs <span x-text="a.game.opposition.name"></span></span>
                                      </template>
                                    </div>
                                    <div class="text-xs text-slate-600 mt-0.5">
                                      🪑 <span x-text="a.player?.full_name || '(player removed)'"></span>
                                      <template x-if="a.player?.family?.family_name">
                                        <span class="text-slate-400"> · <span x-text="a.player.family.family_name + ' Family'"></span></span>
                                      </template>
                                    </div>
                                  </div>
                                  <div class="flex items-center gap-2 shrink-0">
                                    <button x-show="canEdit()" @click="toggleLock(a)"
                                      :class="a.is_locked ? 'text-amber-600' : 'text-slate-300 hover:text-amber-500'"
                                      :title="a.is_locked ? 'Locked — protected from regeneration' : 'Unlocked — will reshuffle on regenerate'">
                                      <span x-text="a.is_locked ? '🔒' : '🔓'"></span>
                                    </button>
                                    <button x-show="canEdit()" @click="clearAssignment(a.game_id)"
                                      class="text-xs text-red-600 hover:underline">Clear</button>
                                  </div>
                                </div>
                              </template>
                            </div>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </template>

            <!-- ========== ROSTER ========== -->
            <template x-if="route === 'roster'">
              <div x-data="rosterView(currentClub, currentStaff)" x-init="init()">

                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-6">
                  <div>
                    <h1 class="text-2xl font-bold">Roster</h1>
                    <p class="text-sm text-slate-500">Players, families, contacts.</p>
                  </div>
                  <div x-show="teams.length > 0">
                    <label class="block text-xs font-medium text-slate-500 mb-1">Team</label>
                    <select x-model="selectedTeamId" @change="onTeamChange()"
                      class="border border-slate-300 rounded-lg px-3 py-2 text-sm">
                      <template x-for="t in teams" :key="t.id">
                        <option :value="t.id" x-text="t.name"></option>
                      </template>
                    </select>
                  </div>
                </div>

                <p x-show="error" x-text="error" class="text-sm text-red-600 mb-3"></p>
                <div x-show="loading" class="text-sm text-slate-500">Loading…</div>

                <!-- No teams message -->
                <div x-show="!loading && teams.length === 0"
                  class="bg-white border border-slate-200 rounded-xl p-8 text-center">
                  <p class="text-slate-600 mb-2">No teams to manage.</p>
                  <p class="text-sm text-slate-500">Go to Teams to create one (admin only) or ask your club admin to assign you.</p>
                </div>

                <template x-if="!loading && selectedTeamId">
                  <div>
                    <!-- Tabs -->
                    <div class="border-b border-slate-200 mb-6 flex gap-6">
                      <button @click="tab = 'players'"
                        :class="tab === 'players' ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-600'"
                        class="pb-2 border-b-2 text-sm font-medium">
                        Players (<span x-text="roster.length"></span>)
                      </button>
                      <button @click="tab = 'families'"
                        :class="tab === 'families' ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-600'"
                        class="pb-2 border-b-2 text-sm font-medium">
                        Families (<span x-text="families.length"></span>)
                      </button>
                    </div>

                    <!-- ==================== PLAYERS TAB ==================== -->
                    <template x-if="tab === 'players'">
                      <div>
                        <div class="flex flex-wrap justify-between items-center gap-2 mb-4">
                          <h2 class="text-base font-semibold" x-text="selectedTeamName() + ' — Roster'"></h2>
                          <div class="flex gap-2" x-show="canEdit()">
                            <button x-show="unrosteredClubPlayers().length > 0" @click="startAddExisting()"
                              class="bg-white border border-brand-600 text-brand-700 hover:bg-brand-50 text-sm rounded-lg px-3 py-2 font-medium">
                              + From club
                            </button>
                            <button @click="startNewPlayer()"
                              class="bg-brand-600 hover:bg-brand-700 text-white text-sm rounded-lg px-4 py-2 font-medium">
                              + New player
                            </button>
                          </div>
                        </div>

                        <p class="text-xs text-slate-500 mb-4">
                          Players are stored at the club level. <em>Remove from team</em> takes them off this roster but keeps them in the club; <em>Delete from club</em> removes them entirely (and from any other team they're on).
                        </p>

                        <!-- Empty state -->
                        <div x-show="roster.length === 0 && !showNewPlayerForm && !showExistingPlayerForm"
                          class="bg-white border border-slate-200 rounded-xl p-8 text-center text-slate-500">
                          No players on this team yet. Click "+ New player" to add one.
                        </div>

                        <!-- Roster table -->
                        <div x-show="roster.length > 0" class="bg-white border border-slate-200 rounded-xl overflow-hidden">
                          <table class="w-full text-sm">
                            <thead class="bg-slate-50 text-xs uppercase text-slate-600">
                              <tr>
                                <th class="text-left p-3 w-12">#</th>
                                <th class="text-left p-3">Name</th>
                                <th class="text-left p-3">Age</th>
                                <th class="text-left p-3">Positions</th>
                                <th class="text-left p-3">Family</th>
                                <th class="text-left p-3">Status</th>
                                <th class="text-right p-3"></th>
                              </tr>
                            </thead>
                            <tbody>
                              <template x-for="m in roster" :key="m.id">
                                <tr class="border-t border-slate-100 hover:bg-brand-50">
                                  <td class="p-3 font-mono text-slate-600" x-text="m.jersey_no ?? '—'"></td>
                                  <td class="p-3">
                                    <div class="font-medium" x-text="m.player?.full_name"></div>
                                    <template x-if="otherTeams(m.player).length > 0">
                                      <div class="text-[10px] text-brand-600 mt-0.5" x-text="'Also on: ' + otherTeams(m.player).join(', ')"></div>
                                    </template>
                                  </td>
                                  <td class="p-3 text-slate-600" x-text="age(m.player)"></td>
                                  <td class="p-3 text-slate-600" x-text="positionsLabel(m)"></td>
                                  <td class="p-3 text-slate-600" x-text="m.player?.family?.family_name || '—'"></td>
                                  <td class="p-3">
                                    <span :class="m.is_active ? 'bg-green-100 text-green-700' : 'bg-slate-200 text-slate-500'"
                                      class="text-xs rounded px-2 py-0.5"
                                      x-text="m.is_active ? 'Active' : 'Inactive'"></span>
                                  </td>
                                  <td class="p-3 text-right whitespace-nowrap">
                                    <button x-show="canEdit()" @click="startEditMembership(m)" class="text-xs text-brand-700 hover:underline mr-2">Edit</button>
                                    <button x-show="canEdit()" @click="removeFromTeam(m)" class="text-xs text-amber-600 hover:underline mr-2">Remove from team</button>
                                    <button x-show="canEdit()" @click="deletePlayerFromClub(m)" class="text-xs text-red-600 hover:underline">Delete from club</button>
                                  </td>
                                </tr>
                              </template>
                            </tbody>
                          </table>
                        </div>

                        <!-- ===== NEW PLAYER FORM ===== -->
                        <template x-if="showNewPlayerForm">
                          <div class="mt-6 bg-white border border-slate-200 rounded-xl p-6">
                            <h3 class="text-lg font-semibold mb-4">New player</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                              <div>
                                <label class="block text-sm font-medium mb-1">Full name *</label>
                                <input x-model="newPlayerForm.full_name" placeholder="Alex Smith"
                                  class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                              </div>
                              <div>
                                <label class="block text-sm font-medium mb-1">Date of birth</label>
                                <input type="date" x-model="newPlayerForm.dob"
                                  class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                              </div>
                              <div>
                                <label class="block text-sm font-medium mb-1">Family</label>
                                <select x-model="newPlayerForm.family_id"
                                  class="w-full border border-slate-300 rounded-lg px-3 py-2">
                                  <option value="">— No family link —</option>
                                  <template x-for="f in families" :key="f.id">
                                    <option :value="f.id" x-text="f.family_name"></option>
                                  </template>
                                </select>
                              </div>
                              <div>
                                <label class="block text-sm font-medium mb-1">Photo URL (optional)</label>
                                <input x-model="newPlayerForm.photo_url" placeholder="https://..."
                                  class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                              </div>
                            </div>
                            <div class="border-t border-slate-200 pt-4 mb-4">
                              <h4 class="text-sm font-semibold text-slate-700 mb-3" x-text="'On ' + selectedTeamName()"></h4>
                              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                <div>
                                  <label class="block text-sm font-medium mb-1">Jersey number</label>
                                  <input type="number" min="0" max="999" x-model="newPlayerForm.jersey_no"
                                    class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                                </div>
                                <div>
                                  <label class="block text-sm font-medium mb-1">Active on this team</label>
                                  <label class="flex items-center gap-2 text-sm h-10">
                                    <input type="checkbox" x-model="newPlayerForm.is_active" />
                                    Include in rotations
                                  </label>
                                </div>
                                <div class="md:col-span-2">
                                  <label class="block text-sm font-medium mb-1">Positions</label>
                                  <div class="flex flex-wrap gap-2">
                                    <template x-for="pos in POSITION_OPTIONS" :key="pos">
                                      <label
                                        :class="newPlayerForm.positions.includes(pos) ? 'bg-brand-100 text-brand-700 border-brand-400' : 'bg-white text-slate-600 border-slate-300'"
                                        class="border rounded-lg px-3 py-1.5 text-sm cursor-pointer">
                                        <input type="checkbox" :checked="newPlayerForm.positions.includes(pos)"
                                          @change="togglePosition(newPlayerForm, pos)" class="hidden" />
                                        <span x-text="pos"></span>
                                      </label>
                                    </template>
                                  </div>
                                </div>
                              </div>
                            </div>
                            <div class="flex gap-2">
                              <button @click="saveNewPlayer()"
                                class="bg-brand-600 hover:bg-brand-700 text-white text-sm rounded-lg px-4 py-2 font-medium">
                                Add to club + roster
                              </button>
                              <button @click="cancelAllForms()" class="text-sm text-slate-600 px-4 py-2">Cancel</button>
                            </div>
                          </div>
                        </template>

                        <!-- ===== ADD EXISTING (FROM CLUB) FORM ===== -->
                        <template x-if="showExistingPlayerForm">
                          <div class="mt-6 bg-white border border-slate-200 rounded-xl p-6">
                            <h3 class="text-lg font-semibold mb-4">Add existing club player to this team</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                              <div class="md:col-span-2">
                                <label class="block text-sm font-medium mb-1">Player</label>
                                <select x-model="existingPlayerForm.player_id"
                                  class="w-full border border-slate-300 rounded-lg px-3 py-2">
                                  <template x-for="p in unrosteredClubPlayers()" :key="p.id">
                                    <option :value="p.id" x-text="p.full_name + (p.family ? ' — ' + p.family.family_name : '')"></option>
                                  </template>
                                </select>
                              </div>
                              <div>
                                <label class="block text-sm font-medium mb-1">Jersey number on this team</label>
                                <input type="number" min="0" max="999" x-model="existingPlayerForm.jersey_no"
                                  class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                              </div>
                              <div>
                                <label class="block text-sm font-medium mb-1">Active on this team</label>
                                <label class="flex items-center gap-2 text-sm h-10">
                                  <input type="checkbox" x-model="existingPlayerForm.is_active" />
                                  Include in rotations
                                </label>
                              </div>
                              <div class="md:col-span-2">
                                <label class="block text-sm font-medium mb-1">Positions on this team</label>
                                <div class="flex flex-wrap gap-2">
                                  <template x-for="pos in POSITION_OPTIONS" :key="pos">
                                    <label
                                      :class="existingPlayerForm.positions.includes(pos) ? 'bg-brand-100 text-brand-700 border-brand-400' : 'bg-white text-slate-600 border-slate-300'"
                                      class="border rounded-lg px-3 py-1.5 text-sm cursor-pointer">
                                      <input type="checkbox" :checked="existingPlayerForm.positions.includes(pos)"
                                        @change="togglePosition(existingPlayerForm, pos)" class="hidden" />
                                      <span x-text="pos"></span>
                                    </label>
                                  </template>
                                </div>
                              </div>
                            </div>
                            <div class="flex gap-2">
                              <button @click="saveAddExisting()"
                                class="bg-brand-600 hover:bg-brand-700 text-white text-sm rounded-lg px-4 py-2 font-medium">
                                Add to roster
                              </button>
                              <button @click="cancelAllForms()" class="text-sm text-slate-600 px-4 py-2">Cancel</button>
                            </div>
                          </div>
                        </template>

                        <!-- ===== EDIT MEMBERSHIP + PLAYER FORM ===== -->
                        <template x-if="editingMembership">
                          <div class="mt-6 bg-white border border-slate-200 rounded-xl p-6">
                            <h3 class="text-lg font-semibold mb-1">Edit player</h3>
                            <p class="text-xs text-slate-500 mb-4">Top section is club-level (applies everywhere). Bottom section is for this team only.</p>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                              <div>
                                <label class="block text-sm font-medium mb-1">Full name *</label>
                                <input x-model="editForm.full_name" class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                              </div>
                              <div>
                                <label class="block text-sm font-medium mb-1">Date of birth</label>
                                <input type="date" x-model="editForm.dob" class="w-full border border-slate-300 rounded-lg px-3 py-2" />
