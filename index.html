<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Club basketball management — roster, ratings, rotation, duty, comms." />
  <title>Game Time Wizard</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏀</text></svg>" />

  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#fff7ed',  100: '#ffedd5',
              500: '#f97316',  600: '#ea580c', 700: '#c2410c', 900: '#7c2d12'
            }
          },
          fontFamily: { sans: ['system-ui','-apple-system','Segoe UI','Roboto','sans-serif'] }
        }
      }
    }
  </script>

  <!-- Alpine.js (defer = runs after DOM parsed) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Supabase JS client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App config (user-supplied — copy config.js.example → config.js) -->
  <script src="config.js"></script>

  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen">

  <div x-data="app()" x-init="init()" x-cloak class="min-h-screen">

    <!-- ========== CONFIG MISSING ========== -->
    <template x-if="configMissing">
      <div class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-lg bg-white border border-amber-300 rounded-xl shadow-sm p-6">
          <h1 class="text-xl font-semibold mb-2">⚙️ Setup needed</h1>
          <p class="text-sm text-slate-600 mb-4">
            <code>config.js</code> is missing or incomplete. Copy <code>config.js.example</code>
            to <code>config.js</code> and fill in your Supabase URL and anon key.
          </p>
        </div>
      </div>
    </template>

    <!-- ========== LOADING ========== -->
    <template x-if="!configMissing && loading">
      <div class="min-h-screen flex items-center justify-center">
        <div class="text-slate-500 text-sm">Loading…</div>
      </div>
    </template>

    <!-- ========== LOGIN ========== -->
    <template x-if="!configMissing && !loading && !session">
      <div class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white border border-slate-200 rounded-xl shadow-sm p-8">
          <div class="text-center mb-6">
            <div class="text-4xl mb-2">🏀</div>
            <h1 class="text-2xl font-bold">Game Time Wizard</h1>
            <p class="text-sm text-slate-500 mt-1">Club basketball management</p>
          </div>

          <template x-if="!magicLinkSent">
            <form @submit.prevent="sendMagicLink()" class="space-y-4">
              <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" required x-model="loginEmail"
                  placeholder="you@example.com"
                  class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" />
              </div>
              <button type="submit" :disabled="sending"
                class="w-full bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white rounded-lg py-2 font-medium">
                <span x-text="sending ? 'Sending…' : 'Send magic link'"></span>
              </button>
              <p class="text-xs text-slate-500 text-center">We'll email you a sign-in link. No password required.</p>
            </form>
          </template>

          <template x-if="magicLinkSent">
            <div class="text-center space-y-3">
              <div class="text-3xl">📬</div>
              <p class="text-sm">
                Check your inbox at <strong x-text="loginEmail"></strong> and click the link to sign in.
              </p>
              <button @click="magicLinkSent = false" class="text-xs text-brand-600 hover:underline">Use a different email</button>
            </div>
          </template>

          <template x-if="loginError">
            <p class="mt-4 text-sm text-red-600 text-center" x-text="loginError"></p>
          </template>
        </div>
      </div>
    </template>

    <!-- ========== ACCESS DENIED ========== -->
    <template x-if="!configMissing && !loading && session && accessDenied">
      <div class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white border border-red-200 rounded-xl shadow-sm p-8 text-center">
          <div class="text-4xl mb-3">🚫</div>
          <h1 class="text-xl font-bold mb-2">No access</h1>
          <p class="text-sm text-slate-600 mb-4">
            You're signed in as <strong x-text="session?.user?.email"></strong> but haven't been added to a club.
            Ask your club admin to invite you, then sign in again.
          </p>
          <button @click="signOut()" class="text-sm text-brand-600 hover:underline">Sign out</button>
        </div>
      </div>
    </template>

    <!-- ========== APP SHELL (signed in, with staff record) ========== -->
    <template x-if="!configMissing && !loading && session && !accessDenied && currentStaff">
      <div class="flex min-h-screen">

        <!-- SIDEBAR -->
        <aside class="w-60 bg-white border-r border-slate-200 hidden md:flex md:flex-col">
          <div class="p-4 border-b border-slate-200">
            <div class="flex items-center gap-2">
              <span class="text-2xl">🏀</span>
              <span class="font-semibold">Game Time Wizard</span>
            </div>
            <div class="mt-2 text-xs text-slate-500 truncate" x-text="currentClub?.name"></div>
          </div>
          <nav class="flex-1 p-3 space-y-1">
            <template x-for="item in nav" :key="item.route">
              <a :href="'#/' + item.route" @click.prevent="navigate(item.route)"
                :class="route === item.route ? 'bg-brand-50 text-brand-700 font-medium' : 'text-slate-700 hover:bg-slate-100'"
                class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm">
                <span x-text="item.icon"></span>
                <span x-text="item.label"></span>
              </a>
            </template>
          </nav>
          <div class="p-3 border-t border-slate-200">
            <div class="text-xs font-medium" x-text="currentStaff?.full_name"></div>
            <div class="text-xs text-slate-500 truncate" x-text="session?.user?.email"></div>
            <div class="mt-1 text-[10px] uppercase tracking-wider text-brand-600" x-show="currentStaff?.is_admin">Admin</div>
            <button @click="signOut()" class="mt-2 w-full text-left text-xs text-slate-600 hover:text-red-600">Sign out</button>
          </div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col">

          <!-- Mobile top bar -->
          <header class="md:hidden bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="text-xl">🏀</span>
              <span class="font-semibold" x-text="currentClub?.name || 'Game Time Wizard'"></span>
            </div>
            <button @click="signOut()" class="text-xs text-slate-600">Sign out</button>
          </header>

          <!-- Mobile bottom nav -->
          <nav class="md:hidden order-last bg-white border-t border-slate-200 grid grid-cols-5">
            <template x-for="item in nav" :key="item.route">
              <a :href="'#/' + item.route" @click.prevent="navigate(item.route)"
                :class="route === item.route ? 'text-brand-600' : 'text-slate-500'"
                class="flex flex-col items-center py-2 text-xs">
                <span class="text-lg" x-text="item.icon"></span>
                <span x-text="item.label"></span>
              </a>
            </template>
          </nav>

          <div class="flex-1 p-4 md:p-8 overflow-y-auto">

            <!-- ========== DASHBOARD ========== -->
            <template x-if="route === 'dashboard'">
              <div>
                <h1 class="text-2xl font-bold mb-1">Dashboard</h1>
                <p class="text-sm text-slate-500 mb-6">Game Week overview — coming in step 6.</p>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div class="bg-white border border-slate-200 rounded-xl p-5">
                    <div class="text-xs uppercase text-slate-500 mb-1">Upcoming games</div>
                    <div class="text-3xl font-bold">—</div>
                  </div>
                  <div class="bg-white border border-slate-200 rounded-xl p-5">
                    <div class="text-xs uppercase text-slate-500 mb-1">Awaiting availability</div>
                    <div class="text-3xl font-bold">—</div>
                  </div>
                  <div class="bg-white border border-slate-200 rounded-xl p-5">
                    <div class="text-xs uppercase text-slate-500 mb-1">Rotations to generate</div>
                    <div class="text-3xl font-bold">—</div>
                  </div>
                </div>
              </div>
            </template>

            <!-- ========== TEAMS LIST ========== -->
            <template x-if="route === 'teams' && !subroute">
              <div x-data="teamsView(currentClub, currentStaff, (r,s) => navigate(r,s))" x-init="init()">
                <div class="flex items-center justify-between mb-6">
                  <div>
                    <h1 class="text-2xl font-bold">Teams</h1>
                    <p class="text-sm text-slate-500">Create teams and assign staff.</p>
                  </div>
                  <button x-show="isAdmin()" @click="startCreate()"
                    class="bg-brand-600 hover:bg-brand-700 text-white text-sm rounded-lg px-4 py-2 font-medium">
                    + New team
                  </button>
                </div>

                <p x-show="error" x-text="error" class="text-sm text-red-600 mb-3"></p>
                <div x-show="loading" class="text-sm text-slate-500">Loading…</div>

                <div x-show="!loading && teams.length === 0 && !showCreate"
                  class="bg-white border border-slate-200 rounded-xl p-8 text-center">
                  <p class="text-slate-600 mb-2">No teams yet.</p>
                  <p class="text-sm text-slate-500" x-show="isAdmin()">Click "+ New team" to create your first team.</p>
                  <p class="text-sm text-slate-500" x-show="!isAdmin()">Ask your club admin to create a team and assign you.</p>
                </div>

                <!-- Team list -->
                <div x-show="!loading && teams.length > 0" class="bg-white border border-slate-200 rounded-xl overflow-hidden">
                  <table class="w-full text-sm">
                    <thead class="bg-slate-50 text-xs uppercase text-slate-600">
                      <tr>
                        <th class="text-left p-3">Team</th>
                        <th class="text-left p-3">Age group</th>
                        <th class="text-left p-3">Format</th>
                        <th class="text-left p-3">Rule mode</th>
                        <th class="text-right p-3"></th>
                      </tr>
                    </thead>
                    <tbody>
                      <template x-for="t in teams" :key="t.id">
                        <tr class="border-t border-slate-100 hover:bg-brand-50">
                          <td class="p-3 font-medium">
                            <a href="#" @click.prevent="open(t)" class="text-brand-700 hover:underline" x-text="t.name"></a>
                          </td>
                          <td class="p-3 text-slate-600" x-text="t.age_group || '—'"></td>
                          <td class="p-3 text-slate-600" x-text="formatLabel(t)"></td>
                          <td class="p-3 text-slate-600" x-text="ruleLabel(t)"></td>
                          <td class="p-3 text-right">
                            <button x-show="isAdmin()" @click="deleteTeam(t)"
                              class="text-xs text-red-600 hover:underline">Delete</button>
                          </td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>

                <!-- Create form -->
                <template x-if="showCreate">
                  <div class="mt-6 bg-white border border-slate-200 rounded-xl p-6">
                    <h2 class="text-lg font-semibold mb-4">New team</h2>
                    <form @submit.prevent="createTeam()" class="space-y-4">
                      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                          <label class="block text-sm font-medium mb-1">Team name *</label>
                          <input required x-model="newTeam.name" placeholder="U14 Boys Black"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                        </div>
                        <div>
                          <label class="block text-sm font-medium mb-1">Age group</label>
                          <input x-model="newTeam.age_group" placeholder="U14"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                        </div>
                        <div>
                          <label class="block text-sm font-medium mb-1">Rule mode</label>
                          <select x-model="newTeam.rule_mode" class="w-full border border-slate-300 rounded-lg px-3 py-2">
                            <option value="equal_opportunity">Equal Opportunity (juniors)</option>
                            <option value="no_engine">No Engine (senior — manual scratch pad)</option>
                          </select>
                        </div>
                        <div>
                          <label class="block text-sm font-medium mb-1">Periods per game</label>
                          <input type="number" min="1" max="8" x-model="newTeam.game_format_periods"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                        </div>
                        <div>
                          <label class="block text-sm font-medium mb-1">Minutes per period</label>
                          <input type="number" min="1" max="30" x-model="newTeam.game_format_minutes_per_period"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                        </div>
                      </div>
                      <div class="text-xs text-slate-500">Total game length: <span x-text="(newTeam.game_format_periods * newTeam.game_format_minutes_per_period)"></span> min</div>
                      <div class="flex gap-2 pt-2">
                        <button type="submit" :disabled="saving"
                          class="bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm rounded-lg px-4 py-2 font-medium">
                          <span x-text="saving ? 'Creating…' : 'Create team'"></span>
                        </button>
                        <button type="button" @click="showCreate = false"
                          class="text-sm text-slate-600 hover:text-slate-900 px-4 py-2">Cancel</button>
                      </div>
                    </form>
                  </div>
                </template>
              </div>
            </template>

            <!-- ========== TEAM DETAIL ========== -->
            <template x-if="route === 'teams' && subroute">
              <div x-data="teamDetailView(currentClub, currentStaff, subroute, (r,s) => navigate(r,s))" x-init="init()">
                <div class="mb-4">
                  <a href="#" @click.prevent="backToList()" class="text-sm text-brand-600 hover:underline">← Back to teams</a>
                </div>

                <div x-show="loading" class="text-sm text-slate-500">Loading…</div>

                <template x-if="!loading && team">
                  <div class="space-y-6">
                    <div>
                      <h1 class="text-2xl font-bold" x-text="team.name"></h1>
                      <div class="text-sm text-slate-500">
                        <span x-text="team.age_group || 'No age group'"></span>
                      </div>
                    </div>

                    <p x-show="error" x-text="error" class="text-sm text-red-600"></p>

                    <!-- Team settings -->
                    <div class="bg-white border border-slate-200 rounded-xl p-6">
                      <h2 class="text-lg font-semibold mb-4">Team settings</h2>
                      <fieldset :disabled="!canEdit()" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <div>
                            <label class="block text-sm font-medium mb-1">Team name</label>
                            <input x-model="teamForm.name" class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Age group</label>
                            <input x-model="teamForm.age_group" class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Rule mode</label>
                            <select x-model="teamForm.rule_mode" class="w-full border border-slate-300 rounded-lg px-3 py-2">
                              <option value="equal_opportunity">Equal Opportunity (juniors)</option>
                              <option value="no_engine">No Engine (senior — manual scratch pad)</option>
                            </select>
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Periods per game</label>
                            <input type="number" min="1" max="8" x-model="teamForm.game_format_periods"
                              class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Minutes per period</label>
                            <input type="number" min="1" max="30" x-model="teamForm.game_format_minutes_per_period"
                              class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                        </div>
                        <div class="text-xs text-slate-500">Total: <span x-text="(teamForm.game_format_periods * teamForm.game_format_minutes_per_period)"></span> min</div>
                        <button x-show="canEdit()" type="button" @click="saveTeam()" :disabled="saving"
                          class="bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm rounded-lg px-4 py-2 font-medium">
                          <span x-text="saving ? 'Saving…' : 'Save changes'"></span>
                        </button>
                      </fieldset>
                    </div>

                    <!-- Staff assignments -->
                    <div class="bg-white border border-slate-200 rounded-xl p-6">
                      <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold">Staff on this team</h2>
                        <button x-show="isAdmin() && unassignedStaff().length > 0" @click="startAddStaff()"
                          class="bg-brand-600 hover:bg-brand-700 text-white text-xs rounded-lg px-3 py-1.5 font-medium">
                          + Assign staff
                        </button>
                      </div>

                      <div x-show="teamStaff.length === 0" class="text-sm text-slate-500">
                        No staff assigned to this team yet.
                      </div>

                      <table x-show="teamStaff.length > 0" class="w-full text-sm">
                        <thead class="text-xs uppercase text-slate-600 border-b border-slate-200">
                          <tr>
                            <th class="text-left py-2">Name</th>
                            <th class="text-left py-2">Email</th>
                            <th class="text-left py-2">Role on team</th>
                            <th class="text-right py-2"></th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="ts in teamStaff" :key="ts.id">
                            <tr class="border-b border-slate-100">
                              <td class="py-2" x-text="ts.staff?.full_name"></td>
                              <td class="py-2 text-slate-600" x-text="ts.staff?.email"></td>
                              <td class="py-2">
                                <select x-show="isAdmin()" :value="ts.role" @change="changeRole(ts, $event.target.value)"
                                  class="text-xs border border-slate-300 rounded px-2 py-1">
                                  <option value="head_coach">Head Coach</option>
                                  <option value="assistant_coach">Assistant Coach</option>
                                  <option value="team_manager">Team Manager</option>
                                </select>
                                <span x-show="!isAdmin()" x-text="roleLabel(ts.role)"></span>
                              </td>
                              <td class="py-2 text-right">
                                <button x-show="isAdmin()" @click="unassign(ts)" class="text-xs text-red-600 hover:underline">Remove</button>
                              </td>
                            </tr>
                          </template>
                        </tbody>
                      </table>

                      <!-- Assign staff form -->
                      <template x-if="showAddStaff">
                        <div class="mt-4 p-4 bg-slate-50 rounded-lg">
                          <div class="grid grid-cols-1 md:grid-cols-3 gap-3 items-end">
                            <div>
                              <label class="block text-xs font-medium mb-1">Staff member</label>
                              <select x-model="selectedStaffId" class="w-full border border-slate-300 rounded px-2 py-1.5 text-sm">
                                <template x-for="s in unassignedStaff()" :key="s.id">
                                  <option :value="s.id" x-text="s.full_name + ' (' + s.email + ')'"></option>
                                </template>
                              </select>
                            </div>
                            <div>
                              <label class="block text-xs font-medium mb-1">Role</label>
                              <select x-model="selectedRole" class="w-full border border-slate-300 rounded px-2 py-1.5 text-sm">
                                <option value="head_coach">Head Coach</option>
                                <option value="assistant_coach">Assistant Coach</option>
                                <option value="team_manager">Team Manager</option>
                              </select>
                            </div>
                            <div class="flex gap-2">
                              <button @click="assignStaff()"
                                class="bg-brand-600 hover:bg-brand-700 text-white text-sm rounded px-3 py-1.5">Assign</button>
                              <button @click="showAddStaff = false"
                                class="text-sm text-slate-600 px-3 py-1.5">Cancel</button>
                            </div>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </template>

            <!-- ========== ROSTER ========== -->
            <template x-if="route === 'roster'">
              <div x-data="rosterView(currentClub, currentStaff)" x-init="init()">

                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-6">
                  <div>
                    <h1 class="text-2xl font-bold">Roster</h1>
                    <p class="text-sm text-slate-500">Players, families, contacts.</p>
                  </div>
                  <div x-show="teams.length > 0">
                    <label class="block text-xs font-medium text-slate-500 mb-1">Team</label>
                    <select x-model="selectedTeamId" @change="onTeamChange()"
                      class="border border-slate-300 rounded-lg px-3 py-2 text-sm">
                      <template x-for="t in teams" :key="t.id">
                        <option :value="t.id" x-text="t.name"></option>
                      </template>
                    </select>
                  </div>
                </div>

                <p x-show="error" x-text="error" class="text-sm text-red-600 mb-3"></p>
                <div x-show="loading" class="text-sm text-slate-500">Loading…</div>

                <!-- No teams message -->
                <div x-show="!loading && teams.length === 0"
                  class="bg-white border border-slate-200 rounded-xl p-8 text-center">
                  <p class="text-slate-600 mb-2">No teams to manage.</p>
                  <p class="text-sm text-slate-500">Go to Teams to create one (admin only) or ask your club admin to assign you.</p>
                </div>

                <template x-if="!loading && selectedTeamId">
                  <div>
                    <!-- Tabs -->
                    <div class="border-b border-slate-200 mb-6 flex gap-6">
                      <button @click="tab = 'players'"
                        :class="tab === 'players' ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-600'"
                        class="pb-2 border-b-2 text-sm font-medium">
                        Players (<span x-text="roster.length"></span>)
                      </button>
                      <button @click="tab = 'families'"
                        :class="tab === 'families' ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-600'"
                        class="pb-2 border-b-2 text-sm font-medium">
                        Families (<span x-text="families.length"></span>)
                      </button>
                    </div>

                    <!-- ==================== PLAYERS TAB ==================== -->
                    <template x-if="tab === 'players'">
                      <div>
                        <div class="flex flex-wrap justify-between items-center gap-2 mb-4">
                          <h2 class="text-base font-semibold" x-text="selectedTeamName() + ' — Roster'"></h2>
                          <div class="flex gap-2" x-show="canEdit()">
                            <button x-show="unrosteredClubPlayers().length > 0" @click="startAddExisting()"
                              class="bg-white border border-brand-600 text-brand-700 hover:bg-brand-50 text-sm rounded-lg px-3 py-2 font-medium">
                              + From club
                            </button>
                            <button @click="startNewPlayer()"
                              class="bg-brand-600 hover:bg-brand-700 text-white text-sm rounded-lg px-4 py-2 font-medium">

                    <template x-if="showAddStaff">
                      <div class="bg-white border border-slate-200 rounded-xl p-6 max-w-2xl mb-4">
                        <h3 class="text-base font-semibold mb-4">Invite a staff member</h3>
                        <div class="space-y-3 mb-4">
                          <div>
                            <label class="block text-sm font-medium mb-1">Full name *</label>
                            <input x-model="newStaff.full_name" placeholder="Jane Smith"
                              class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Email *</label>
                            <input type="email" x-model="newStaff.email" placeholder="jane@example.com"
                              class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                          <label class="flex items-center gap-2 text-sm">
                            <input type="checkbox" x-model="newStaff.is_admin" />
                            Make this person a club admin
                          </label>
                        </div>
                        <div class="bg-amber-50 border border-amber-200 rounded p-3 text-xs text-amber-800 mb-4">
                          <strong>Heads up:</strong> after you add them, copy this URL into a message and send it to them.
                          They sign in with the same email — they'll then have access automatically.
                          <div class="mt-2 font-mono break-all bg-white p-2 rounded" x-text="inviteUrl()"></div>
                        </div>
                        <div class="flex gap-2">
                          <button @click="addStaff()" :disabled="saving"
                            class="bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm rounded-lg px-4 py-2 font-medium">
                            <span x-text="saving ? 'Adding…' : 'Add staff'"></span>
                          </button>
                          <button @click="showAddStaff = false" class="text-sm text-slate-600 px-4 py-2">Cancel</button>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>

          </div>
        </main>
      </div>
    </template>

  </div>

  <!-- App scripts: order matters — data layer first, then app, then views -->
  <script src="js/lib/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/views/settings.js"></script>
  <script src="js/views/teams.js"></script>
  <script src="js/views/team-detail.js"></script>
  <script src="js/views/roster.js"></script>
</body>
</html>
