                              <p class="mt-1 text-xs text-amber-600">
                                No opponents match this team's age group + division. Click <strong>+ New</strong> or untick the filter.
                              </p>
                            </template>
                            <template x-if="showNewOpponent">
                              <div class="mt-3 p-3 bg-slate-50 rounded-lg space-y-2">
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                                  <input type="text" x-model="newOpponent.name" placeholder="Opponent name"
                                    class="border border-slate-300 rounded px-2 py-1.5 text-sm" />
                                  <input type="text" x-model="newOpponent.age_group" placeholder="Age group (e.g. B10)"
                                    class="border border-slate-300 rounded px-2 py-1.5 text-sm" />
                                  <input type="text" x-model="newOpponent.division" placeholder="Division (e.g. Div 5)"
                                    class="border border-slate-300 rounded px-2 py-1.5 text-sm" />
                                </div>
                                <p class="text-xs text-slate-500">
                                  Age group + division pre-filled from your team. Adjust if this opponent is in a different bracket.
                                </p>
                                <div class="flex gap-2">
                                  <button type="button" @click="addOpponent()"
                                    class="bg-brand-600 hover:bg-brand-700 text-white text-sm rounded px-3 py-1.5">Add opponent</button>
                                  <button type="button" @click="showNewOpponent = false"
                                    class="text-sm text-slate-600 px-3 py-1.5">Cancel</button>
                                </div>
                              </div>
                            </template>
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Venue</label>
                            <input type="text" x-model="form.venue" placeholder="e.g. Auchenflower Stadium"
                              class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Court</label>
                            <input type="text" x-model="form.court" placeholder="e.g. Court 2"
                              class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Periods (override team default)</label>
                            <input type="number" min="1" max="8" x-model="form.periods"
                              class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Minutes per period</label>
                            <input type="number" min="1" max="30" x-model="form.minutes_per_period"
                              class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Status</label>
                            <select x-model="form.status" class="w-full border border-slate-300 rounded-lg px-3 py-2">
                              <option value="scheduled">Scheduled</option>
                              <option value="completed">Completed</option>
                              <option value="cancelled">Cancelled</option>
                              <option value="bye">Bye</option>
                            </select>
                          </div>
                          <div class="md:col-span-2">
                            <label class="block text-sm font-medium mb-1">Notes</label>
                            <textarea x-model="form.notes" rows="2"
                              class="w-full border border-slate-300 rounded-lg px-3 py-2"></textarea>
                          </div>
                        </div>
                        <div class="flex gap-2">
                          <button @click="saveGame()" :disabled="saving"
                            class="bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm rounded-lg px-4 py-2 font-medium">
                            <span x-text="saving ? 'Saving…' : (editingGameId ? 'Save changes' : 'Create game')"></span>
                          </button>
                          <button @click="cancelForm()" class="text-sm text-slate-600 px-4 py-2">Cancel</button>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>

            <!-- ========== GAME WEEK (per game) ========== -->
            <template x-if="route === 'games' && subroute">
              <div x-data="gameWeekView(currentClub, currentStaff, subroute, (r,s) => navigate(r,s))" x-init="init()">
                <div class="mb-4">
                  <a href="#" @click.prevent="backToList()" class="text-sm text-brand-600 hover:underline">← Back to games</a>
                </div>

                <div x-show="loading" class="text-sm text-slate-500">Loading…</div>
                <p x-show="error" x-text="error" class="text-sm text-red-600 mb-3"></p>

                <template x-if="!loading && game">
                  <div class="space-y-6">

                    <!-- Game header -->
                    <div class="bg-white border border-slate-200 rounded-xl p-6">
                      <div class="flex items-start justify-between gap-4 mb-4">
                        <div>
                          <div class="text-sm text-slate-500 uppercase tracking-wider" x-text="game.team?.name"></div>
                          <h1 class="text-2xl font-bold mt-1">vs <span x-text="game.opposition?.name || 'TBD'"></span></h1>
                          <div class="text-sm text-slate-600 mt-1" x-text="formatDate(game.game_date)"></div>
                        </div>
                        <span :class="statusBadgeClass(game.status)" class="text-xs rounded px-3 py-1 font-medium" x-text="game.status"></span>
                      </div>
                      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                        <div>
                          <div class="text-xs uppercase text-slate-500">Time</div>
                          <div x-text="formatTime(game.game_time) || '—'"></div>
                        </div>
                        <div>
                          <div class="text-xs uppercase text-slate-500">Venue</div>
                          <div x-text="game.venue || '—'"></div>
                        </div>
                        <div>
                          <div class="text-xs uppercase text-slate-500">Court</div>
                          <div x-text="game.court || '—'"></div>
                        </div>
                        <div>
                          <div class="text-xs uppercase text-slate-500">Format</div>
                          <div x-text="formatLabel()"></div>
                        </div>
                      </div>
                      <div class="mt-3 text-sm font-medium text-brand-600" x-text="daysLabel()"></div>
                    </div>

                    <!-- Workflow cards -->
                    <div>
                      <h2 class="text-lg font-semibold mb-3">Game week workflow</h2>
                      <div class="space-y-3">

                        <!-- Day -7: Availability request (placeholder until step 9) -->
                        <template x-for="step in workflowSteps().filter(s => s.key === 'availability')" :key="step.key">
                          <div class="bg-white border rounded-xl p-5"
                               :class="step.windowOpen ? 'border-brand-300 bg-brand-50/30' : 'border-slate-200'">
                            <div class="flex items-start justify-between gap-3 mb-2">
                              <div class="flex items-start gap-2">
                                <span class="text-xl" x-text="step.icon"></span>
                                <div>
                                  <h3 class="font-semibold" x-text="step.label"></h3>
                                  <div class="text-xs text-slate-600 mt-0.5" x-text="step.status"></div>
                                </div>
                              </div>
                              <span x-show="step.windowOpen"
                                class="text-[10px] uppercase tracking-wider bg-brand-600 text-white rounded px-2 py-0.5">Now</span>
                            </div>
                            <div class="mt-2 text-xs text-slate-500 italic" x-text="step.placeholder"></div>
                          </div>
                        </template>

                        <!-- Day -2: Logistics + bench duty (real duty UI) -->
                        <template x-for="step in workflowSteps().filter(s => s.key === 'logistics')" :key="step.key">
                          <div class="bg-white border rounded-xl p-5"
                               :class="step.windowOpen ? 'border-brand-300 bg-brand-50/30' : 'border-slate-200'">
                            <div class="flex items-start justify-between gap-3 mb-3">
                              <div class="flex items-start gap-2">
                                <span class="text-xl" x-text="step.icon"></span>
                                <div>
                                  <h3 class="font-semibold" x-text="step.label"></h3>
                                  <div class="text-xs text-slate-600 mt-0.5">Comms message coming in step 9.</div>
                                </div>
                              </div>
                              <span x-show="step.windowOpen"
                                class="text-[10px] uppercase tracking-wider bg-brand-600 text-white rounded px-2 py-0.5">Now</span>
                            </div>

                            <!-- Bench duty inline (player-based) -->
                            <div class="mt-2 p-3 bg-slate-50 rounded-lg">
                              <div class="flex items-center justify-between">
                                <div class="text-sm">
                                  <span class="text-slate-600">🪑 Bench duty:</span>
                                  <template x-if="dutyPlayerLabel()">
                                    <span class="font-semibold ml-1" x-text="dutyPlayerLabel()"></span>
                                  </template>
                                  <template x-if="!dutyPlayerLabel()">
                                    <span class="italic text-slate-500 ml-1">Not assigned</span>
                                  </template>
                                  <template x-if="dutyAssignment?.is_locked">
                                    <span class="ml-2 text-xs text-amber-600">🔒 Locked</span>
                                  </template>
                                </div>
                                <div class="flex gap-2 text-xs">
                                  <template x-if="dutyAssignment">
                                    <button @click="toggleDutyLock()" class="text-slate-600 hover:text-amber-600"
                                      :title="dutyAssignment.is_locked ? 'Unlock' : 'Lock to protect from regenerate'">
                                      <span x-text="dutyAssignment.is_locked ? '🔒' : '🔓'"></span>
                                    </button>
                                  </template>
                                  <button @click="startDutyReassign()" class="text-brand-600 hover:underline"
                                    x-text="dutyAssignment ? 'Reassign' : 'Assign'"></button>
                                  <template x-if="dutyAssignment">
                                    <button @click="clearDuty()" class="text-red-600 hover:underline">Clear</button>
                                  </template>
                                </div>
                              </div>

                              <!-- Reassign form -->
                              <template x-if="showDutyReassign">
                                <div class="mt-3 pt-3 border-t border-slate-200">
                                  <template x-if="eligibleDutyPool().length === 0">
                                    <p class="text-xs text-slate-500 italic">
                                      No duty-eligible players. Open the team's Bench Duty section and tick at least one player.
                                    </p>
                                  </template>
                                  <template x-if="eligibleDutyPool().length > 0">
                                    <div class="flex gap-2 items-center">
                                      <select x-model="selectedDutyPlayer" class="flex-1 border border-slate-300 rounded px-2 py-1.5 text-sm">
                                        <option value="">— Pick a player —</option>
                                        <template x-for="m in eligibleDutyPool()" :key="m.id">
                                          <option :value="m.player.id"
                                            x-text="m.player.full_name + (m.player.family?.family_name ? ' (' + m.player.family.family_name + ')' : '')"></option>
                                        </template>
                                      </select>
                                      <button @click="saveDutyReassign()"
                                        class="bg-brand-600 hover:bg-brand-700 text-white text-xs rounded px-3 py-1.5">Save</button>
                                      <button @click="cancelDutyReassign()"
                                        class="text-xs text-slate-600 px-2 py-1.5">Cancel</button>
                                    </div>
                                  </template>
                                  <p class="mt-2 text-[10px] text-slate-500">
                                    Manual assignment locks the slot — won't be reshuffled by Generate Roster on the team page.
                                  </p>
                                </div>
                              </template>
                            </div>
                          </div>
                        </template>

                        <!-- Day -1: Game day notice (placeholder until step 9) -->
                        <template x-for="step in workflowSteps().filter(s => s.key === 'gameday')" :key="step.key">
                          <div class="bg-white border rounded-xl p-5"
                               :class="step.windowOpen ? 'border-brand-300 bg-brand-50/30' : 'border-slate-200'">
                            <div class="flex items-start justify-between gap-3 mb-2">
                              <div class="flex items-start gap-2">
                                <span class="text-xl" x-text="step.icon"></span>
                                <div>
                                  <h3 class="font-semibold" x-text="step.label"></h3>
                                  <div class="text-xs text-slate-600 mt-0.5" x-text="step.status"></div>
                                </div>
                              </div>
                              <span x-show="step.windowOpen"
                                class="text-[10px] uppercase tracking-wider bg-brand-600 text-white rounded px-2 py-0.5">Now</span>
                            </div>
                            <div class="mt-2 text-xs text-slate-500 italic" x-text="step.placeholder"></div>
                          </div>
                        </template>
                      </div>
                    </div>

                    <!-- Post-game card -->
                    <div class="bg-white border border-slate-200 rounded-xl p-5">
                      <h3 class="font-semibold mb-3 flex items-center gap-2">
                        <span class="text-xl">🎯</span>
                        Post-game
                      </h3>
                      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                          <label class="block text-xs font-medium mb-1">Status</label>
                          <select x-model="postGame.status" @change="onPostGameChange()"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
                            <option value="scheduled">Scheduled</option>
                            <option value="completed">Completed</option>
                            <option value="cancelled">Cancelled</option>
                            <option value="bye">Bye</option>
                          </select>
                        </div>
                        <div>
                          <label class="block text-xs font-medium mb-1">Result</label>
                          <select x-model="postGame.result" @change="postGameDirty = true"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
                            <option value="">— Not recorded —</option>
                            <option value="win">Win</option>
                            <option value="loss">Loss</option>
                            <option value="draw">Draw</option>
                            <option value="no_result">No result</option>
                            <option value="bye">Bye</option>
                          </select>
                        </div>
                        <div>
                          <label class="block text-xs font-medium mb-1">Team score</label>
                          <input type="number" min="0" x-model="postGame.team_score" @input="onPostGameChange()"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" />
                        </div>
                        <div>
                          <label class="block text-xs font-medium mb-1" x-text="'Opposition score (' + (game.opposition?.name || 'TBD') + ')'"></label>
                          <input type="number" min="0" x-model="postGame.opposition_score" @input="onPostGameChange()"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" />
                        </div>
                        <div class="md:col-span-2">
                          <label class="block text-xs font-medium mb-1">Coach notes</label>
                          <textarea x-model="postGame.notes" @input="postGameDirty = true" rows="3"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm"
                            placeholder="What worked, what didn't, what to focus on next session"></textarea>
                        </div>
                      </div>
                      <div class="text-xs text-slate-500 mb-3 italic">
                        Per-player attendance + coach notes per player will land alongside the rotation engine in step 8.
                      </div>
                      <div class="flex gap-2">
                        <button @click="savePostGame()" :disabled="!postGameDirty || saving"
                          class="bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm rounded-lg px-4 py-2 font-medium">
                          <span x-text="saving ? 'Saving…' : 'Save post-game data'"></span>
                        </button>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </template>

            <!-- ========== SETTINGS ========== -->
            <template x-if="route === 'settings'">
              <div x-data="settingsView(currentClub, currentStaff)" x-init="init()">
                <h1 class="text-2xl font-bold mb-1">Settings</h1>
                <p class="text-sm text-slate-500 mb-6">Club name and staff roster.</p>

                <div class="border-b border-slate-200 mb-6 flex gap-6">
                  <button @click="tab = 'club'"
                    :class="tab === 'club' ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-600'"
                    class="pb-2 border-b-2 text-sm font-medium">Club</button>
                  <button @click="tab = 'staff'"
                    :class="tab === 'staff' ? 'border-brand-600 text-brand-700' : 'border-transparent text-slate-600'"
                    class="pb-2 border-b-2 text-sm font-medium">Staff</button>
                </div>

                <p x-show="error" x-text="error" class="text-sm text-red-600 mb-3"></p>
                <div x-show="loading" class="text-sm text-slate-500">Loading…</div>

                <!-- CLUB TAB -->
                <template x-if="!loading && tab === 'club'">
                  <div class="bg-white border border-slate-200 rounded-xl p-6 max-w-xl">
                    <h2 class="text-lg font-semibold mb-4">Club details</h2>
                    <fieldset :disabled="!isAdmin()" class="space-y-4">
                      <div>
                        <label class="block text-sm font-medium mb-1">Club name</label>
                        <input x-model="clubName" class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                      </div>
                      <button x-show="isAdmin()" @click="saveClub()" :disabled="saving"
                        class="bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm rounded-lg px-4 py-2 font-medium">
                        <span x-text="saving ? 'Saving…' : 'Save'"></span>
                      </button>
                      <p x-show="!isAdmin()" class="text-xs text-slate-500">Only club admins can edit these settings.</p>
                    </fieldset>
                  </div>
                </template>

                <!-- STAFF TAB -->
                <template x-if="!loading && tab === 'staff'">
                  <div>
                    <div class="flex items-center justify-between mb-4">
                      <h2 class="text-lg font-semibold">Staff</h2>
                      <button x-show="isAdmin()" @click="startAdd()"
                        class="bg-brand-600 hover:bg-brand-700 text-white text-sm rounded-lg px-4 py-2 font-medium">
                        + Invite staff
                      </button>
                    </div>

                    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden mb-4">
                      <table class="w-full text-sm">
                        <thead class="bg-slate-50 text-xs uppercase text-slate-600">
                          <tr>
                            <th class="text-left p-3">Name</th>
                            <th class="text-left p-3">Email</th>
                            <th class="text-left p-3">Status</th>
                            <th class="text-left p-3">Admin</th>
                            <th class="text-right p-3"></th>
                          </tr>
                        </thead>
                        <tbody>
                          <template x-for="s in staffList" :key="s.id">
                            <tr class="border-t border-slate-100">
                              <td class="p-3 font-medium" x-text="s.full_name"></td>
                              <td class="p-3 text-slate-600" x-text="s.email"></td>
                              <td class="p-3 text-xs text-slate-500" x-text="s.user_id ? 'Active' : 'Invited (not yet signed in)'"></td>
                              <td class="p-3">
                                <button x-show="isAdmin()" @click="toggleAdmin(s)"
                                  :class="s.is_admin ? 'bg-brand-100 text-brand-700' : 'bg-slate-100 text-slate-500'"
                                  class="text-xs rounded px-2 py-1" x-text="s.is_admin ? 'Admin' : 'Member'"></button>
                                <span x-show="!isAdmin()" class="text-xs text-slate-500" x-text="s.is_admin ? 'Yes' : 'No'"></span>
                              </td>
                              <td class="p-3 text-right">
                                <button x-show="isAdmin()" @click="removeStaff(s)" class="text-xs text-red-600 hover:underline">Remove</button>
                              </td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>

                    <!-- Add staff form -->
                    <template x-if="showAddStaff">
                      <div class="bg-white border border-slate-200 rounded-xl p-6 max-w-2xl mb-4">
                        <h3 class="text-base font-semibold mb-4">Invite a staff member</h3>
                        <div class="space-y-3 mb-4">
                          <div>
                            <label class="block text-sm font-medium mb-1">Full name *</label>
                            <input x-model="newStaff.full_name" placeholder="Jane Smith"
                              class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                          <div>
                            <label class="block text-sm font-medium mb-1">Email *</label>
                            <input type="email" x-model="newStaff.email" placeholder="jane@example.com"
                              class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                          </div>
                          <label class="flex items-center gap-2 text-sm">
                            <input type="checkbox" x-model="newStaff.is_admin" />
                            Make this person a club admin
                          </label>
                        </div>
                        <div class="bg-amber-50 border border-amber-200 rounded p-3 text-xs text-amber-800 mb-4">
                          <strong>Heads up:</strong> after you add them, copy this URL into a message and send it to them.
                          They sign in with the same email — they'll then have access automatically.
                          <div class="mt-2 font-mono break-all bg-white p-2 rounded" x-text="inviteUrl()"></div>
                        </div>
                        <div class="flex gap-2">
                          <button @click="addStaff()" :disabled="saving"
                            class="bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white text-sm rounded-lg px-4 py-2 font-medium">
                            <span x-text="saving ? 'Adding…' : 'Add staff'"></span>
                          </button>
                          <button @click="showAddStaff = false" class="text-sm text-slate-600 px-4 py-2">Cancel</button>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>

          </div>
        </main>
      </div>
    </template>

  </div>

  <!-- App scripts: order matters — data layer first, then app, then views -->
  <script src="js/lib/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/settings.js"></script>
  <script src="js/views/teams.js"></script>
  <script src="js/views/team-detail.js"></script>
  <script src="js/views/roster.js"></script>
  <script src="js/views/ratings.js"></script>
  <script src="js/views/games.js"></script>
  <script src="js/views/game-week.js"></script>
</body>
</html>
